<script>
(function () {
  const TARGET_TEXT = 'Verified';

  function patchTooltips(root = document) {
    // Tooltip içeriği DOM'a geldiyse
    root.querySelectorAll('.tooltip-inner').forEach(el => {
      if (el.textContent && el.textContent.includes('Linkstap')) {
        el.textContent = TARGET_TEXT;
      }
    });

    // Attribute tooltipleri (bazı sistemlerde text buradan gelir)
    root.querySelectorAll('[title],[data-original-title],[data-bs-title],[aria-label]').forEach(el => {
      const attrs = ['title','data-original-title','data-bs-title','aria-label'];

      attrs.forEach(a => {
        const v = el.getAttribute(a);
        if (v && v.includes('Linkstap')) {
          el.setAttribute(a, TARGET_TEXT);
        }
      });
    });
  }

  document.addEventListener('DOMContentLoaded', () => patchTooltips());

  // Tooltip hover anında oluşuyorsa yakala
  const obs = new MutationObserver(mutations => {
    for (const m of mutations) {
      for (const n of m.addedNodes) {
        if (n.nodeType !== 1) continue;
        // Yeni tooltip eklendiyse veya içinde tooltip-inner varsa
        if (n.matches?.('.tooltip') || n.querySelector?.('.tooltip-inner')) {
          patchTooltips(n);
        }
      }
    }
  });

  obs.observe(document.documentElement, { childList: true, subtree: true });

  // Ek güvenlik: hover'da tekrar kontrol
  document.addEventListener('mouseover', () => patchTooltips(), true);
})();
</script>

  --black-700: hsla(0 0% 12% / 1);

  transition: transform var(--transtion);
}

.xbutton::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 100%;
  height: 100%;
  background-color: var(--black-700);

  transition: all var(--transtion);
  z-index: 0;
}

.xbutton::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 100%;
  height: 100%;
  background-color: hsla(260 97% 61% / 0.75);

  background-position: top;

  opacity: var(--active, 0);
  border-radius: var(--border_radius);
  transition: opacity var(--transtion);
  z-index: 2;
}

.xbutton:is(:hover, :focus-visible) {
  --active: 1;
}
.xbutton:active {
  transform: scale(1);
}

.xbutton .dots_border {
  --size_border: calc(100% + 2px);

  overflow: hidden;

  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: var(--size_border);
  height: var(--size_border);
  background-color: transparent;

  border-radius: var(--border_radius);
  z-index: -10;
}

.xbutton .dots_border::before {
  content: "";
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  transform-origin: left;
  transform: rotate(0deg);

  width: 100%;
  height: 2rem;

  const box = document.querySelector('.XTII__wrap');
  const link = document.querySelector('.XTII__wrap .XTII__link');

    // close'a basıldıysa asla yönlendirme yapma
    if(e.target.closest('.XTII__close')) return;

    // zaten linke basıldıysa bırak (çift tetik olmasın)

    // linkin normal davranışını tetikle
    link.click();
  });

  if(closeBtn) {
    closeBtn.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();

      box.style.opacity = '0';
      box.style.transform = 'translateX(-50%) translateY(20px)';
      setTimeout(() => box.remove(), 250);
    });
  }
});
</script>                                                            </div>

        <script src="https://linkstap.com/themes/altum/assets/js/libraries/jquery-qrcode.min.js?v=6200"></script>

        <script>
            'use strict';

            let generate_qr = (element, data) => {
                let default_options = {
                    render: 'image',
                    minVersion: 1,
                    maxVersion: 40,
                    ecLevel: 'L',
                    left: 0,
                    top: 0,
                    size: 1000,
                    text: data,
                    quiet: 0,
                    mode: 0,
                    mSize: 0.1,
                    mPosX: 0.5,
                    mPosY: 0.5,
                };

                /* Delete already existing image generated */
                element.querySelector('img') && element.querySelector('img').remove();
                $(element).qrcode(default_options);

                /* Set class to QR */
                element.querySelector('img').classList.add('w-100');
                element.querySelector('img').classList.add('rounded');
            }

            let qr_codes = document.querySelectorAll('[data-qr]');

            qr_codes.forEach(element => {
                generate_qr(element, element.getAttribute('data-qr'));
            })
        </script>

        
        <script>
    'use strict';

    /* Background backdrop fix on modal */
    let backdrop_filter = null;
    $('.modal').on('show.bs.modal', function () {
        backdrop_filter = document.querySelector('body').style.backdropFilter;
        document.querySelector('body').style.backdropFilter = '';
    });

    $('.modal').on('hide.bs.modal', function () {
        document.querySelector('body').style.backdropFilter = backdrop_filter;
    });

    /* Internal tracking for biolink page blocks */
    document.querySelectorAll('a[data-track-biolink-block-id]').forEach(element => {
        element.addEventListener('click', event => {
            let biolink_block_id = event.currentTarget.getAttribute('data-track-biolink-block-id');
            navigator.sendBeacon(`${site_url}l/link?biolink_block_id=${biolink_block_id}&no_redirect`);
        });
    });

    /* Fix CSS when using scroll for background attachment on long content */
    if(document.body.offsetHeight > window.innerHeight) {
        let background_attachment = document.querySelector('body').style.backgroundAttachment;
        if(background_attachment == 'scroll') {
            document.documentElement.style.height = 'auto';
        }
    }
</script>
